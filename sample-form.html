<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=0">
		<style>
			.content-box {
				background-color: lightblue;
				width: 100%;
				height: 100%;
			}
			.static-box {
				position: static;
			} 

			.relative-box { 
				position: relative; 
				top: 20px;
				left: 20px;
			}
			.absolute-box { 
				position: absolute; 
				top: 70px;
				left: 50px;
			}

			.fixed-box { 
				position: fixed;
				 top: 20px;
			} 
		</style>
	</head>
	<body class="content-box">
		<div class="static-box">
			This is a static box.
		</div>

		<div class="absolute-box">
			This is an absolutely positioned box. 
		</div>

		<div class="relative-box">
			This is a relatively positioned box.
		</div>
		<div class="fixed-box">
			This is a fixed-positioned box.
		</div>
		

	</body>
</html>
